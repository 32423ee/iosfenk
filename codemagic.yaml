workflows:
  ios-ipa:
    name: iOS Unsigned IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "FingerprintProDemoApp.xcodeproj"
        XCODE_SCHEME: "FingerprintProDemoApp"
        BUNDLE_ID: "com.example.iosfenk"
    scripts:
      - name: Set FingerprintPro API key (optional)
        script: |-
          if [ -n "$FINGERPRINTPRO_API_KEY" ]; then
            /usr/libexec/PlistBuddy -c "Set :FINGERPRINTPRO_API_KEY $FINGERPRINTPRO_API_KEY" Info.plist
          fi
      - name: Resolve Swift Package dependencies
        script: |-
          xcodebuild -resolvePackageDependencies -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME"
      - name: Build (no code signing)
        script: |-
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            build
      - name: Package unsigned IPA
        script: |-
          APP_PATH="$(find build/DerivedData/Build/Products -maxdepth 2 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "Failed to find .app in build products"
            exit 1
          fi
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -r unsigned.ipa Payload
    artifacts:
      - build/unsigned.ipa
      - build/**/*.dSYM
