workflows:
  ios-ipa:
    name: iOS IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "FingerprintProDemoApp.xcodeproj"
        XCODE_SCHEME: "FingerprintProDemoApp"
        EXPORT_OPTIONS_PLIST: "ExportOptions.plist"
        IOS_TEAM_ID: ""
        BUNDLE_ID: "com.example.iosfenk"
    scripts:
      - name: Set FingerprintPro API key (optional)
        script: |-
          if [ -n "$FINGERPRINTPRO_API_KEY" ]; then
            /usr/libexec/PlistBuddy -c "Set :FINGERPRINTPRO_API_KEY $FINGERPRINTPRO_API_KEY" Info.plist
          fi
      - name: Resolve Swift Package dependencies
        script: |-
          xcodebuild -resolvePackageDependencies -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME"
      - name: Archive
        script: |-
          if [ -z "$IOS_TEAM_ID" ]; then
            echo "Missing IOS_TEAM_ID (Apple Developer Team ID). Set it in Codemagic environment variables."
            exit 1
          fi
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/"$XCODE_SCHEME".xcarchive \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            archive
      - name: Export IPA
        script: |-
          xcodebuild \
            -exportArchive \
            -archivePath build/"$XCODE_SCHEME".xcarchive \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -exportPath build/ipa \
            -allowProvisioningUpdates
    artifacts:
      - build/ipa/*.ipa
      - build/**/*.dSYM
      - build/**/*.xcarchive
